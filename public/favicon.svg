<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="64" height="64">
  <!-- Background circle with forest dark -->
  <circle cx="50" cy="50" r="48" fill="#0a1009"/>
  <circle cx="50" cy="50" r="47" fill="none" stroke="#C7A86D" stroke-width="1.5" opacity="0.3"/>
  
  <!-- Three minimalist buildings inside the Q -->
  <rect x="36" y="43" width="6.5" height="17" rx="0.5" fill="#4a7c3f"/>
  <rect x="46.5" y="32" width="6.5" height="28" rx="0.5" fill="#C7A86D"/>
  <rect x="57" y="38" width="6.5" height="22" rx="0.5" fill="#4a7c3f"/>
  
  <!-- Foundation Curve -->
  <path d="M 33 60 C 43 62.5, 57 62.5, 67 60" stroke="#4a7c3f" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- Circular ring of the Q -->
  <circle cx="50" cy="46" r="27" stroke="#C7A86D" stroke-width="7.2" fill="none"/>

  <!-- Q's Tail -->
  <path d="M 69.5 65.5 C 74.5 71.5, 80 77, 85 81" stroke="#C7A86D" stroke-width="7.2" stroke-linecap="round" fill="none"/>
  
  <!-- Topographical contours -->
  <path d="M 85 81 C 71.5 85.5, 51.5 83.5, 34 79.5 C 22.5 77, 12.5 79, 6.5 81" stroke="#C7A86D" stroke-width="3.2" stroke-linecap="round" fill="none"/>
  <path d="M 72 71.5 C 60 76.5, 44 74.5, 28 69 C 18 65, 10 67.5, 5.5 69" stroke="#4a7c3f" stroke-width="2" stroke-linecap="round" fill="none"/>
</svg>
